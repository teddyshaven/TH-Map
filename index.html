<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teddy's Haven Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="container">
  <div id="sidebar">
    <div id="sidebar-logo">
      <img src="assets/th_logo.png" alt="Teddy's Haven">
    </div>

    <div class="sidebar-section">
      <h3>Search</h3>
      <div id="search-wrapper">
        <input type="text" id="search-input" placeholder="Search fruits, crystals, creatures…" autocomplete="off">
        <div id="search-results"></div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Resources</h3>
      <label><input type="checkbox" id="toggle-fruits"> 🍓 Fruits</label>
      <label><input type="checkbox" id="toggle-stone"> 🪨 Stone</label>
      <label><input type="checkbox" id="toggle-crystal"> 💎 Crystal</label>
      <label><input type="checkbox" id="toggle-creatures"> 🐾 Creatures</label>
    </div>

    <div class="sidebar-section">
      <h3>Fruit Season</h3>
      <div id="season-filters">

        <div class="season-row">
          <button class="season-btn active" data-season="spring">🌸 Spring</button>
          <div class="fruit-dropdown open" id="dropdown-spring">
            <button class="fruit-filter-btn" data-season="spring" data-fruit="">All</button>
            <button class="fruit-filter-btn" data-season="spring" data-fruit="Ghost Berry">Ghost Berry</button>
            <button class="fruit-filter-btn" data-season="spring" data-fruit="Azureberry">Azureberry</button>
            <button class="fruit-filter-btn" data-season="spring" data-fruit="Skydrop Berry">Skydrop Berry</button>
            <button class="fruit-filter-btn" data-season="spring" data-fruit="Nightshade Berry">Nightshade Berry</button>
            <button class="fruit-filter-btn" data-season="spring" data-fruit="Emberberry">Emberberry</button>
            <button class="fruit-filter-btn" data-season="spring" data-fruit="Bloodberry">Bloodberry</button>
            <button class="fruit-filter-btn" data-season="spring" data-fruit="Greenwhistle Apple">Greenwhistle Apple</button>
          </div>
        </div>

        <div class="season-row">
          <button class="season-btn" data-season="summer">☀️ Summer</button>
          <div class="fruit-dropdown" id="dropdown-summer">
            <button class="fruit-filter-btn" data-season="summer" data-fruit="">All</button>
            <button class="fruit-filter-btn" data-season="summer" data-fruit="Solberry">Solberry</button>
            <button class="fruit-filter-btn" data-season="summer" data-fruit="Nightblush Berry">Nightblush Berry</button>
            <button class="fruit-filter-btn" data-season="summer" data-fruit="Tigermelon">Tigermelon</button>
            <button class="fruit-filter-btn" data-season="summer" data-fruit="Velvenight Berry">Velvenight Berry</button>
            <button class="fruit-filter-btn" data-season="summer" data-fruit="Heartgleam">Heartgleam</button>
            <button class="fruit-filter-btn" data-season="summer" data-fruit="Honeycran Berry">Honeycran Berry</button>
            <button class="fruit-filter-btn" data-season="summer" data-fruit="Sunapple">Sunapple</button>
          </div>
        </div>

        <div class="season-row">
          <button class="season-btn" data-season="fall">🍂 Fall</button>
          <div class="fruit-dropdown" id="dropdown-fall">
            <button class="fruit-filter-btn" data-season="fall" data-fruit="">All</button>
            <button class="fruit-filter-btn" data-season="fall" data-fruit="Mirthshade">Mirthshade</button>
            <button class="fruit-filter-btn" data-season="fall" data-fruit="Mireberry">Mireberry</button>
            <button class="fruit-filter-btn" data-season="fall" data-fruit="Mellowspike">Mellowspike</button>
            <button class="fruit-filter-btn" data-season="fall" data-fruit="Scarletip">Scarletip</button>
            <button class="fruit-filter-btn" data-season="fall" data-fruit="Seafallow Berry">Seafallow Berry</button>
            <button class="fruit-filter-btn" data-season="fall" data-fruit="Amberburst">Amberburst</button>
            <button class="fruit-filter-btn" data-season="fall" data-fruit="Amberfall Apple">Amberfall Apple</button>
          </div>
        </div>

        <div class="season-row">
          <button class="season-btn" data-season="winter">❄️ Winter</button>
          <div class="fruit-dropdown" id="dropdown-winter">
            <button class="fruit-filter-btn" data-season="winter" data-fruit="">All</button>
            <button class="fruit-filter-btn" data-season="winter" data-fruit="Velvitfrost Berry">Velvitfrost Berry</button>
            <button class="fruit-filter-btn" data-season="winter" data-fruit="Twilipuff">Twilipuff</button>
            <button class="fruit-filter-btn" data-season="winter" data-fruit="Faepeach">Faepeach</button>
            <button class="fruit-filter-btn" data-season="winter" data-fruit="Frostgleam">Frostgleam</button>
            <button class="fruit-filter-btn" data-season="winter" data-fruit="Icerose Berry">Icerose Berry</button>
            <button class="fruit-filter-btn" data-season="winter" data-fruit="Lunabright">Lunabright</button>
            <button class="fruit-filter-btn" data-season="winter" data-fruit="Frostveil Apple">Frostveil Apple</button>
          </div>
        </div>

        <div class="season-row">
          <button class="season-btn" data-season="all">🗓️ All Year</button>
          <div class="fruit-dropdown" id="dropdown-all">
            <button class="fruit-filter-btn" data-season="all" data-fruit="">All</button>
            <button class="fruit-filter-btn" data-season="all" data-fruit="Azureberry">Azureberry</button>
            <button class="fruit-filter-btn" data-season="all" data-fruit="Ghost Berry">Ghost Berry</button>
            <button class="fruit-filter-btn" data-season="all" data-fruit="Royal Peach">Royal Peach</button>
          </div>
        </div>

      </div>
    </div>
    <div id="map-credit">
      World map created by <strong>Hexley</strong>
    </div>
  </div>

  <div id="map-wrapper">
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="fruits.js"></script>
<script src="stone.js"></script>
<script src="crystal.js"></script>
<script src="creatures.js"></script>
<script src="script.js"></script>
</body>
</html>
